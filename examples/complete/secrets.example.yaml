# Skeleton for cluster secrets. Encrypt with sops before committing.
# Keys match what main.tf reads via the carlpett/sops provider.

argocd:
  # Plaintext for humans / runbooks (not consumed by Terraform).
  admin_password: "change-me"
  # Bcrypt hash consumed by the Argo CD Helm chart.
  # htpasswd -nbBC 10 "" 'change-me' | tr -d ':\n' | sed 's/$2y/$2a/'
  admin_password_bcrypt: "$2a$10$REPLACE_ME"
  repo_ssh_private_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_ME
    -----END OPENSSH PRIVATE KEY-----

gcp:
  # Full service account JSON with DNS admin on the Cloud DNS project.
  dns_credentials_json: |
    {
      "type": "service_account",
      "project_id": "my-gcp-project",
      "private_key_id": "REPLACE_ME",
      "private_key": "-----BEGIN PRIVATE KEY-----\nREPLACE_ME\n-----END PRIVATE KEY-----\n",
      "client_email": "dns-admin@my-gcp-project.iam.gserviceaccount.com",
      "client_id": "REPLACE_ME",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "REPLACE_ME"
    }

# Optional — only if enable_gitea_actions = true
# gitea:
#   runner_registration_token: "REPLACE_ME"
